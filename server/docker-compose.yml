services:
  db:
    image: postgres:17-alpine
    container_name: ahuihou_db
    restart: always
    environment:
      POSTGRES_USER: santiago_dev
      POSTGRES_PASSWORD: 1000785414
      POSTGRES_DB: ahuihou
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santiago_dev -d ahuihou"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ahuihou_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=ahuihou;Username=santiago_dev;Password=1000785414;
      - JWT__Key=UnaClaveSuperSecretaDeAlMenos32Caracteres!
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: